<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بەڕێوەبردنی نیشتەجێی</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>بەڕێوەبردنی نیشتەجێی</h1>
    </header>

    <section id="login">
        <h2>بچۆنە ناو سیستەم</h2>
        <form id="login-form">
            <label for="username">ناوی بەکارهێنەر:</label>
            <input type="text" id="username" name="username" required>
            <br>
            <label for="password">تێپەڕوشە:</label>
            <input type="password" id="password" name="password" required>
            <br>
            <button type="submit">بچۆنە ناو سیستەم</button>
        </form>
    </section>

    <section id="admin">
        <h2>بەشی هەژمار/بەرێوەبەری</h2>
        <form id="property-form">
            <label for="property-name">ناوی نیشتەجێی:</label>
            <input type="text" id="property-name" name="property-name" required>
            <br>
            <label for="price">نرخ:</label>
            <input type="number" id="price" name="price" required>
            <br>
            <label for="location">شوێن:</label>
            <input type="text" id="location" name="location" required>
            <br>
            <label for="mobile">ژمارەی مۆبایل:</label>
            <input type="tel" id="mobile" name="mobile" placeholder="+964-770-000-0000" required>
            <br>
            <label for="description">تێبینی:</label>
            <textarea id="description" name="description" required></textarea>
            <br>
            <button type="submit">زیادکردنی نیشتەجێی</button>
        </form>
    </section>

    <section id="dashboard">
        <h2>داشبۆردی بەڕێوەبردنی نیشتەجێی</h2>
        <div id="properties-list">
            <!-- داتای دینامیکی نیشتەجێی لێرە زیاد دەکرێت -->
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
